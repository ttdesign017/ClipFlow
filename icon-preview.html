<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图标预览 - 选择你喜欢的 Pin 图标</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 12px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }
    .card.selected {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .icon-wrapper {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrapper i { width: 100%; height: 100%; }
    .name {
      font-size: 13px;
      color: #333;
      font-weight: 500;
    }
    .copy-btn {
      margin-top: 8px;
      padding: 4px 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .copy-btn { opacity: 1; }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📌 Pin 图标预览</h1>
    <p class="subtitle">点击图标复制 SVG 代码，或记下名称用于代码中</p>
    
    <div class="grid" id="iconGrid"></div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const icons = [
      // Lucide 官方图标库中的 pin 相关图标
      { name: 'pin', label: '经典图钉' },
      { name: 'pin-off', label: '图钉-关闭' },
      { name: 'map-pin', label: '地图标记' },
      { name: 'map-pin-off', label: '地图标记-关闭' },
      { name: 'navigation', label: '导航箭头' },
      { name: 'compass', label: '指南针' },
      { name: 'anchor', label: '船锚' },
      { name: 'bookmark', label: '书签' },
      { name: 'tag', label: '标签' },
      { name: 'flag', label: '旗帜' },
      { name: 'flag-off', label: '旗帜-关闭' },
      { name: 'hash', label: '井号' },
      { name: 'star', label: '星星' },
      { name: 'heart', label: '爱心' },
      { name: 'circle', label: '圆形' },
      { name: 'circle-dot', label: '圆点' },
      { name: 'square', label: '方形' },
      { name: 'diamond', label: '菱形' },
      { name: 'triangle', label: '三角形' },
      { name: 'cross', label: '叉号' },
      { name: 'plus', label: '加号' },
      { name: 'minus', label: '减号' },
      { name: 'check', label: '勾选' },
      { name: 'x', label: '关闭-X' },
      { name: 'trash-2', label: '垃圾桶' },
      { name: 'trash', label: '垃圾桶-简单' },
      { name: 'copy', label: '复制' },
      { name: 'clipboard', label: '剪贴板' },
      { name: 'clipboard-copy', label: '剪贴板-复制' },
      { name: 'clipboard-check', label: '剪贴板-勾选' },
      { name: 'clipboard-list', label: '剪贴板-列表' },
      { name: 'clipboard-type', label: '剪贴板-文字' },
      { name: 'list', label: '列表' },
      { name: 'list-checks', label: '列表-勾选' },
      { name: 'align-start-vertical', label: '置顶-上对齐' },
      { name: 'arrow-up', label: '上箭头' },
      { name: 'chevrons-up', label: '双上箭头' },
      { name: 'arrow-up-from-line', label: '从底部上升' },
      { name: 'move-up', label: '向上移动' },
      { name: 'arrow-up-to-line', label: '上升到顶部' },
      { name: 'fold-vertical', label: '折叠-垂直' },
      { name: 'grip-vertical', label: '拖拽手柄-竖' },
      { name: 'grip-horizontal', label: '拖拽手柄-横' },
      { name: 'more-vertical', label: '更多-竖' },
      { name: 'more-horizontal', label: '更多-横' },
      { name: 'ellipsis', label: '省略号-横' },
      { name: 'ellipsis-vertical', label: '省略号-竖' },
      { name: 'search', label: '搜索-放大镜' },
      { name: 'settings', label: '设置-齿轮' },
    ];

    const grid = document.getElementById('iconGrid');
    const toast = document.getElementById('toast');

    icons.forEach(icon => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="icon-wrapper">
          <i data-lucide="${icon.name}"></i>
        </div>
        <div class="name">${icon.label}</div>
        <button class="copy-btn" data-icon="${icon.name}">复制 SVG</button>
      `;
      grid.appendChild(card);
    });

    // 初始化 Lucide 图标
    lucide.createIcons();

    // 复制按钮
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const iconName = btn.dataset.icon;
        const svgCode = `<i data-lucide="${iconName}"></i>`;
        await navigator.clipboard.writeText(svgCode);
        showToast(`已复制: ${iconName}`);
      });
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
